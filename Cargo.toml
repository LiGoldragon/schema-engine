[package]
name="schema-engine"
version="0.1.0"
edition="2024"
rust-version="1.89"
license="MIT OR Apache-2.0"
repository="https://github.com/LiGoldragon/schema-engine"
description="Core-first Schema daemon and thin CLI"
[dependencies]
golden-bridge={git="https://github.com/LiGoldragon/golden-bridge.git",rev="97e53ec31984430f2a267757562f829c94d3c873"}
kameo={git="https://github.com/LiGoldragon/kameo.git",rev="f491b45d7dcb55e5837eddde3d5d7ca8ceaa9f01",default-features=false,features=["macros"]}
rkyv={version="0.8",features=["bytecheck"]}
signal-schema={git="https://github.com/LiGoldragon/signal-schema.git",rev="fcc929bdf3f348376e66eb8a58a0b0d1a3ca57dd"}
signal-sema-storage={git="https://github.com/LiGoldragon/signal-sema-storage.git",rev="1bd593f4040307bd4d1db76ee15aa67d00efe1e6"}
tokio={version="1",features=["macros","rt-multi-thread","net","io-util","fs","sync"]}
thiserror="2"
[lints.rust]
unsafe_code="forbid"
